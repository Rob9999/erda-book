<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1100" viewBox="0 0 2000 1100" role="img" aria-labelledby="title desc">
  <title id="title">Reformpfad 2025–2035</title>
  <desc id="desc">Roadmap der Reformphase 2025 bis 2035 mit drei Wirkungsebenen: Institutionen, Sicherheit und Souveränität, Gesellschaft und Legitimation.</desc>
  <defs>
    <style>
      .bg{fill:#f6f8fb}
      .axis{stroke:#15324b;stroke-width:4}
      .grid{stroke:#d5dde6;stroke-width:1.5}
      .title{font:700 34px 'DejaVu Sans', Arial, sans-serif;fill:#15324b}
      .subtitle{font:400 20px 'DejaVu Sans', Arial, sans-serif;fill:#425466}
      .year{font:700 18px 'DejaVu Sans', Arial, sans-serif;fill:#15324b}
      .lane{font:700 20px 'DejaVu Sans', Arial, sans-serif;fill:#15324b}
      .small{font:400 15px 'DejaVu Sans', Arial, sans-serif;fill:#425466}
      .box1{fill:#ffffff;stroke:#15324b;stroke-width:2.5}
      .box2{fill:#e8f2f3;stroke:#1a6e73;stroke-width:2.5}
      .box3{fill:#f6efe1;stroke:#c59b4d;stroke-width:2.5}
      .callout{fill:#15324b}
      .calloutText{font:700 18px 'DejaVu Sans', Arial, sans-serif;fill:#ffffff}
    </style>
  </defs>

  <rect class="bg" width="2000" height="1100" rx="24"/>
  <text class="title" x="80" y="72">Reformpfad 2025–2035</text>
  <text class="subtitle" x="80" y="104">Strategische Neuausrichtung: Reformfähigkeit, EDA-Aufbau, CIVITAS, Erweiterungslogik und Verfassungskonvent</text>

  <text class="lane" x="90" y="220">Institutionen</text>
  <text class="lane" x="90" y="445">Sicherheit &amp;</text>
  <text class="lane" x="90" y="470">Souveränität</text>
  <text class="lane" x="90" y="670">Gesellschaft &amp;</text>
  <text class="lane" x="90" y="695">Legitimation</text>

  <line class="axis" x1="230" y1="170" x2="1450" y2="170"/>
  <line class="axis" x1="230" y1="395" x2="1450" y2="395"/>
  <line class="axis" x1="230" y1="620" x2="1450" y2="620"/>

  <line class="grid" x1="290" y1="145" x2="290" y2="760"/>
  <line class="grid" x1="470" y1="145" x2="470" y2="760"/>
  <line class="grid" x1="650" y1="145" x2="650" y2="760"/>
  <line class="grid" x1="830" y1="145" x2="830" y2="760"/>
  <line class="grid" x1="1010" y1="145" x2="1010" y2="760"/>
  <line class="grid" x1="1190" y1="145" x2="1190" y2="760"/>
  <line class="grid" x1="1370" y1="145" x2="1370" y2="760"/>

  <text class="year" x="260" y="135">2025</text>
  <text class="year" x="440" y="135">2026–27</text>
  <text class="year" x="640" y="135">2028</text>
  <text class="year" x="815" y="135">2030</text>
  <text class="year" x="995" y="135">2032</text>
  <text class="year" x="1175" y="135">2034</text>
  <text class="year" x="1350" y="135">2035</text>

  <rect class="box1" x="245" y="190" width="180" height="95" rx="16"/>
  <text class="year" x="335" y="224" text-anchor="middle">Reformdialog</text>
  <text class="small" x="335" y="251" text-anchor="middle">EU- und nationale</text>
  <text class="small" x="335" y="272" text-anchor="middle">Neuausrichtung</text>

  <rect class="box1" x="430" y="190" width="230" height="95" rx="16"/>
  <text class="year" x="545" y="224" text-anchor="middle">Pragmatic Federalism</text>
  <text class="small" x="545" y="251" text-anchor="middle">Opt-in-Module, QMV,</text>
  <text class="small" x="545" y="272" text-anchor="middle">Anti-Veto-Design</text>

  <rect class="box1" x="720" y="190" width="220" height="95" rx="16"/>
  <text class="year" x="830" y="224" text-anchor="middle">Verfassungskonvent</text>
  <text class="small" x="830" y="251" text-anchor="middle">digitale Foren,</text>
  <text class="small" x="830" y="272" text-anchor="middle">ERDA-Charta vorbereiten</text>

  <rect class="box1" x="1040" y="190" width="220" height="95" rx="16"/>
  <text class="year" x="1150" y="224" text-anchor="middle">Konzentrische Kreise</text>
  <text class="small" x="1150" y="251" text-anchor="middle">Erweiterungslogik nach</text>
  <text class="small" x="1150" y="272" text-anchor="middle">Wertebindung</text>

  <rect class="box2" x="360" y="415" width="220" height="95" rx="16"/>
  <text class="year" x="470" y="449" text-anchor="middle">EDA-Aufbau</text>
  <text class="small" x="470" y="476" text-anchor="middle">Artikel-5-Äquivalent,</text>
  <text class="small" x="470" y="497" text-anchor="middle">Kommandostruktur</text>

  <rect class="box2" x="620" y="415" width="220" height="95" rx="16"/>
  <text class="year" x="730" y="449" text-anchor="middle">Defense Nodes</text>
  <text class="small" x="730" y="476" text-anchor="middle">regionale Knoten,</text>
  <text class="small" x="730" y="497" text-anchor="middle">Cyberschutz, RRF</text>

  <rect class="box2" x="900" y="415" width="240" height="95" rx="16"/>
  <text class="year" x="1020" y="449" text-anchor="middle">FORTERA-Impulse</text>
  <text class="small" x="1020" y="476" text-anchor="middle">Chips, Batterien,</text>
  <text class="small" x="1020" y="497" text-anchor="middle">Wasserstoff, Cloud</text>

  <rect class="box3" x="255" y="640" width="230" height="95" rx="16"/>
  <text class="year" x="370" y="674" text-anchor="middle">CIVITAS-Piloten</text>
  <text class="small" x="370" y="701" text-anchor="middle">digitale Agora,</text>
  <text class="small" x="370" y="722" text-anchor="middle">Bürgerbeteiligung</text>

  <rect class="box3" x="560" y="640" width="240" height="95" rx="16"/>
  <text class="year" x="680" y="674" text-anchor="middle">Jugend &amp; Zivilgesellschaft</text>
  <text class="small" x="680" y="701" text-anchor="middle">Demokratielabore,</text>
  <text class="small" x="680" y="722" text-anchor="middle">lokale Begleitstruktur</text>

  <rect class="box3" x="900" y="640" width="265" height="95" rx="16"/>
  <text class="year" x="1032" y="674" text-anchor="middle">Globale Demokratienetzwerke</text>
  <text class="small" x="1032" y="701" text-anchor="middle">strategische Partner</text>
  <text class="small" x="1032" y="722" text-anchor="middle">über Europa hinaus</text>

  <rect class="callout" x="1490" y="235" width="215" height="170" rx="20"/>
  <text class="calloutText" x="1597" y="278" text-anchor="middle">Zielbild 2035</text>
  <text class="small" x="1597" y="316" text-anchor="middle" fill="#dce9f2">handlungsfähige,</text>
  <text class="small" x="1597" y="341" text-anchor="middle" fill="#dce9f2">demokratisch kontrollierte</text>
  <text class="small" x="1597" y="366" text-anchor="middle" fill="#dce9f2">europäische Architektur</text>

  <path d="M 425 237 C 445 237, 430 237, 430 237" class="axis" fill="none"/>
  <path d="M 660 237 L 720 237" class="axis" fill="none"/>
  <path d="M 940 237 L 1040 237" class="axis" fill="none"/>
  <path d="M 580 462 L 620 462" class="axis" fill="none"/>
  <path d="M 840 462 L 900 462" class="axis" fill="none"/>
  <path d="M 485 687 L 560 687" class="axis" fill="none"/>
  <path d="M 800 687 L 900 687" class="axis" fill="none"/>

  <text class="small" x="1490" y="455">Drei Leitlogiken:</text>
  <text class="small" x="1490" y="480">• Entscheidungsfähigkeit vor Vollständigkeit</text>
  <text class="small" x="1490" y="504">• Demokratische Kontrolle als Bedingung</text>
  <text class="small" x="1490" y="528">• Keine Single Points of Failure</text>
</svg>
